<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Generals Bots Web</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-line">
          <span id="connection-dot" class="connection-dot is-connecting" aria-hidden="true"></span>
          <span class="brand-title">Generals Bots</span>
          <span id="mode-label" class="mode-label">Starting</span>
        </div>
        <div class="top-actions">
          <button id="reconnect-button" type="button">Reconnect</button>
          <button id="restart-button" type="button">Restart</button>
        </div>
      </header>

      <main class="game-layout">
        <section class="board-region" aria-label="Game board">
          <div class="board-frame">
            <canvas id="game-board" width="900" height="900" aria-label="Generals board"></canvas>
          </div>
          <div id="status-message" class="status-message">Connecting</div>
        </section>

        <aside class="side-panel" aria-label="Game controls and state">
          <section class="control-strip">
            <label class="switch-control">
              <input id="split-toggle" type="checkbox">
              <span>Split</span>
            </label>
            <label class="switch-control">
              <input id="auto-tick-toggle" type="checkbox">
              <span>Auto tick</span>
            </label>
            <label class="number-control">
              <span>Rate</span>
              <input id="tick-rate-input" type="number" min="0.1" max="30" step="0.1" value="2">
            </label>
          </section>

          <section class="command-row" aria-label="Commands">
            <button id="pass-button" type="button">Pass</button>
            <button id="cancel-button" type="button">Cancel</button>
          </section>

          <section class="metric-grid">
            <div class="metric">
              <span class="metric-label">Turn</span>
              <strong id="turn-value">0</strong>
            </div>
            <div class="metric">
              <span class="metric-label">Steps</span>
              <strong id="step-value">0</strong>
            </div>
            <div class="metric">
              <span class="metric-label">Winner</span>
              <strong id="winner-value">-</strong>
            </div>
          </section>

          <section class="players-panel">
            <h2>Players</h2>
            <div id="players-list" class="players-list"></div>
          </section>

          <section class="preview-panel">
            <h2>Policy Preview</h2>
            <div id="preview-value" class="preview-value">-</div>
            <ol id="preview-list" class="preview-list"></ol>
          </section>
        </aside>
      </main>
    </div>
    <script src="/static/app.js" defer></script>
  </body>
</html>
